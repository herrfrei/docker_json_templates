name: forgejo

services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:${FORGEJO_VERSION:-latest}
    container_name: forgejo
    restart: unless-stopped
    environment:
      USER_UID: 500
      USER_GID: 500
    volumes:
      - ${DATA_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - '3000:3000'
      # - '2222:22'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
